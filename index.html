<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Nusitas ❤️</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

        body { 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh; 
            text-align: center;
            padding: 40px 20px;
            transition: background 1.5s ease-in-out;
        }

        /* --- FONDOS DINÁMICOS --- */
        .modo-dia {
            background-image: linear-gradient(rgba(255, 255, 255, 0.2), rgba(0, 0, 0, 0.6)), url('fondoDia.jpg');
        }

        .modo-noche {
            background-image: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), url('fondoNoche.jpg');
        }

        /* --- CONTENEDOR ESTILO CRISTAL OSCURO --- */
        .container {
            padding: 30px;
            background: rgba(10, 10, 10, 0.75);
            border-radius: 30px;
            backdrop-filter: blur(12px);
            border: 2px solid #8a2be2;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 0 30px rgba(138, 43, 226, 0.5);
            color: #ffffff;
            transition: transform 0.3s;
        }

        h1 { 
            font-size: 3.5em; 
            margin-bottom: 10px; 
            color: #00ff80; 
            text-shadow: 0 0 20px rgba(0, 255, 128, 0.8); 
        }

        p.intro { 
            font-size: 1.2em; 
            margin-bottom: 30px; 
            font-style: italic; 
            color: #d896ff; 
            text-shadow: 0 0 10px rgba(216, 150, 255, 0.5);
        }

        /* --- MENÚ DE BOTONES --- */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .btn-menu {
            padding: 15px;
            font-size: 1em;
            font-weight: bold;
            text-decoration: none;
            color: #ffffff;
            border: 2px solid #8a2be2;
            border-radius: 15px;
            transition: 0.3s;
            background: rgba(20, 20, 20, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        /* Botón especial para el Portal de Deseos (ocupa toda la fila) */
        .btn-deseos {
            grid-column: 1 / -1;
            border-color: #00ff80;
            color: #00ff80;
            background: rgba(0, 255, 128, 0.1);
            font-size: 1.1em;
            letter-spacing: 1px;
        }

        .btn-menu:hover {
            border-color: #00ff80;
            color: #00ff80;
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(0, 255, 128, 0.5);
        }

        /* --- CONTADOR --- */
        .contador-container {
            margin-top: 20px;
            padding: 20px;
            border-top: 1px solid rgba(138, 43, 226, 0.4);
        }

        .contador-titulo {
            color: #00ff80;
            font-size: 1.1em;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(0, 255, 128, 0.5);
        }

        #reloj {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .tiempo-box {
            background: rgba(0, 0, 0, 0.85);
            padding: 15px 10px;
            border-radius: 15px;
            min-width: 75px;
            border: 1px solid #8a2be2;
            box-shadow: 0 0 15px rgba(138, 43, 226, 0.3);
        }

        .tiempo-box span {
            display: block;
            font-size: 2em;
            font-weight: bold;
            color: #00ff80;
            text-shadow: 0 0 15px rgba(0, 255, 128, 0.6);
        }

        .tiempo-box p {
            font-size: 0.7em;
            color: #d896ff;
            text-transform: uppercase;
            margin-top: 5px;
        }
    </style>
</head>
<body id="main-body">

    <div class="container">
        <h1>Nusitas ❤️</h1>
        <p class="intro">Toda nuestra historia en un solo lugar...</p>

        <div class="menu-grid">
            <a href="galeria.html" class="btn-menu">📸 Galería</a>
            <a href="canciones.html" class="btn-menu">🎧 Playlist</a>
            <a href="decisiones.html" class="btn-menu">🔮 El Oráculo</a> 
            <a href="lugares.html" class="btn-menu">📍 Lugares</a>
            
            <a href="deseos.html" class="btn-menu btn-deseos">✨ Portal de los Deseos ✨</a>
        </div>

        <div class="contador-container">
            <p class="contador-titulo">Tiempo Juntos ✨</p>
            <div id="reloj">
                <div class="tiempo-box">
                    <span id="dias">00</span>
                    <p>Días</p>
                </div>
                <div class="tiempo-box">
                    <span id="horas">00</span>
                    <p>Hrs</p>
                </div>
                <div class="tiempo-box">
                    <span id="minutos">00</span>
                    <p>Min</p>
                </div>
                <div class="tiempo-box">
                    <span id="segundos">00</span>
                    <p>Seg</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- LOGICA DE HORARIO (Día/Noche) ---
        function actualizarAmbiente() {
            const hora = new Date().getHours();
            const body = document.getElementById('main-body');
            
            // Día: 6 AM a 6 PM
            if (hora >= 6 && hora < 18) {
                body.className = "modo-dia";
            } else {
                body.className = "modo-noche";
            }
        }
        
        actualizarAmbiente();
        setInterval(actualizarAmbiente, 60000);

        // --- LÓGICA DEL CONTADOR (Iniciado el 23 de Julio de 2024) ---
        const fechaInicio = new Date(2024, 6, 23, 0, 0, 0); 

        function actualizarContador() {
            const ahora = new Date();
            const diferencia = ahora - fechaInicio;

            const d = Math.floor(diferencia / (1000 * 60 * 60 * 24));
            const h = Math.floor((diferencia % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diferencia % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diferencia % (1000 * 60)) / 1000);

            document.getElementById('dias').innerText = d;
            document.getElementById('horas').innerText = h < 10 ? '0' + h : h;
            document.getElementById('minutos').innerText = m < 10 ? '0' + m : m;
            document.getElementById('segundos').innerText = s < 10 ? '0' + s : s;
        }

        setInterval(actualizarContador, 1000);
        actualizarContador();
    </script>
</body>
</html>
