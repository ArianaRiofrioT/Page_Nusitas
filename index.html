<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuestro Universo ❤️</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #0d0d0d; color: white; overflow-x: hidden; text-align: center; }

        /* --- CAPA DE MANTENIMIENTO (EL BLOQUEO) --- */
        #capa-mantenimiento {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; color: #ff007f; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 999999; /* Por encima de todo */
        }
        #capa-mantenimiento h1 { font-size: 3.5rem; text-shadow: 0 0 20px #ff007f; margin: 0; }
        #capa-mantenimiento p { color: #333; margin-top: 15px; font-style: italic; }

        /* --- ESTILOS ORIGINALES (TODO SIGUE AQUÍ) --- */
        .header { padding: 60px 20px; background: linear-gradient(to bottom, #1a1a1a, #0d0d0d); }
        h2 { color: #00ff80; font-size: 2.5em; text-shadow: 0 0 10px rgba(0, 255, 128, 0.3); }

        .contador-container { margin: 40px auto; padding: 20px; max-width: 600px; border: 2px solid #8a2be2; border-radius: 20px; background: rgba(138, 43, 226, 0.05); }
        .grid-botones { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 20px; padding: 20px; max-width: 800px; margin: 0 auto; }
        
        .btn-seccion {
            background: #1a1a1a; border: 2px solid #8a2be2; color: white; padding: 20px;
            border-radius: 15px; text-decoration: none; font-weight: bold; transition: 0.3s;
        }
        .btn-seccion:hover { background: #8a2be2; transform: scale(1.05); box-shadow: 0 0 15px #8a2be2; }

        /* Corazones flotantes */
        .corazon { position: fixed; bottom: -50px; color: #ff007f; animation: flotar 6s linear infinite; opacity: 0.5; z-index: -1; }
        @keyframes flotar {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            50% { opacity: 0.7; }
            100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="capa-mantenimiento">
        <h1>ya no existe 🖕</h1>
        <p></p>
    </div>

    <div class="header">
        <h2>Para mi Nusita favorita ❤️</h2>
    </div>

    <div class="contador-container">
        <div id="reloj">Cargando tiempo juntos...</div>
    </div>

    <div class="grid-botones">
        <a href="galeria.html" class="btn-seccion">📸 Galería</a>
        <a href="lugares.html" class="btn-seccion">📍 Lugares</a>
        <a href="oraculo.html" class="btn-seccion">🔮 Oráculo</a>
        <a href="deseos.html" class="btn-seccion">✨ Deseos</a>
    </div>

    <script>
        // SCRIPT DEL CONTADOR (TU ORIGINAL)
        const fechaInicio = new Date("2023-11-20T00:00:00").getTime(); // Cambia a tu fecha real
        setInterval(() => {
            const ahora = new Date().getTime();
            const diff = ahora - fechaInicio;
            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);
            document.getElementById("reloj").innerHTML = `${d}d ${h}h ${m}m ${s}s`;
        }, 1000);

        // CORAZONES FLOTANTES
        function crearCorazon() {
            const c = document.createElement("div");
            c.className = "corazon";
            c.innerHTML = "❤️";
            c.style.left = Math.random() * 100 + "vw";
            c.style.fontSize = Math.random() * 20 + 10 + "px";
            c.style.animationDuration = Math.random() * 3 + 3 + "s";
            document.body.appendChild(c);
            setTimeout(() => c.remove(), 6000);
        }
        setInterval(crearCorazon, 300);
    </script>
</body>
</html>
