<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuestros Lugares ❤️</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #0d0d0d; color: white; padding: 40px 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        .btn-volver { position: fixed; top: 20px; left: 20px; color: #555; text-decoration: none; font-size: 2em; z-index: 100; transition: 0.3s; }
        .btn-volver:hover { color: #8a2be2; }

        h1 { color: #00ff80; text-shadow: 0 0 15px #00ff80; margin-bottom: 5px; }
        .subtitulo { color: #d896ff; margin-bottom: 30px; font-style: italic; }

        .form-nuevo-lugar {
            background: rgba(26, 26, 26, 0.9);
            border: 1px solid #8a2be2;
            padding: 25px;
            border-radius: 20px;
            width: 100%;
            max-width: 500px;
            margin-bottom: 50px;
            box-shadow: 0 0 20px rgba(138, 43, 226, 0.2);
        }

        input, textarea { width: 100%; background: #111; border: 1px solid #333; color: white; padding: 12px; margin-bottom: 15px; border-radius: 10px; outline: none; }
        input[type="file"] { border: 1px dashed #8a2be2; padding: 15px; cursor: pointer; }

        .btn-guardar {
            width: 100%; background: #8a2be2; color: white; border: none; padding: 14px; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .btn-guardar:hover { background: #00ff80; color: #0d0d0d; box-shadow: 0 0 15px #00ff80; }

        .lugares-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; width: 100%; max-width: 1100px; }
        
        .card-lugar { 
            background: #1a1a1a; border-radius: 20px; overflow: hidden; border: 1px solid #8a2be2; position: relative;
        }

        .img-contenedor { width: 100%; height: 230px; background: #222; }
        .img-contenedor img { width: 100%; height: 100%; object-fit: cover; }
        
        .info-lugar { padding: 20px; }
        .info-lugar h3 { color: #00ff80; margin-bottom: 8px; }
        .info-lugar p { color: #ccc; font-size: 0.95em; }

        /* Botón de borrar */
        .btn-borrar {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(255, 0, 0, 0.7);
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 50%;
            cursor: pointer;
            font-weight: bold;
            opacity: 0;
            transition: 0.3s;
        }
        .card-lugar:hover .btn-borrar { opacity: 1; }
        .btn-borrar:hover { background: red; transform: scale(1.1); }

        #status { text-align: center; margin-top: 15px; color: #00ff80; font-weight: bold; }
    </style>
</head>
<body>

    <a href="index.html" class="btn-volver">⬅</a>

    <h1>Nuestra Ruta ❤️</h1>
    <p class="subtitulo">Recuerdos compartidos y eternos...</p>

    <div class="form-nuevo-lugar">
        <input type="text" id="nombreLugar" placeholder="¿Qué lugar es?">
        <input type="text" id="fechaLugar" placeholder="¿Cuándo fue?">
        <input type="file" id="fotoArchivo" accept="image/*">
        <textarea id="descLugar" placeholder="Cuéntame qué pasó..."></textarea>
        <button class="btn-guardar" id="btnAccion" onclick="subirYGuardar()">Guardar en la Nube ✨</button>
        <p id="status"></p>
    </div>

    <div class="lugares-grid" id="contenedorLugares"></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDccmduaptWiK-3VKRWeU2PR4PBscr-Tmg",
            authDomain: "webnusitas.firebaseapp.com",
            projectId: "webnusitas",
            storageBucket: "webnusitas.firebasestorage.app",
            messagingSenderId: "509688237934",
            appId: "1:509688237934:web:2a7af79ebb0a9128b77b7f"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const CLOUD_NAME = "dzmkvt63j"; 
        const UPLOAD_PRESET = "web_fotos"; 

        async function subirYGuardar() {
            const nombre = document.getElementById('nombreLugar').value;
            const fileInput = document.getElementById('fotoArchivo');
            const btn = document.getElementById('btnAccion');
            const status = document.getElementById('status');

            if (!nombre || !fileInput.files[0]) return alert("Falta nombre o foto");

            btn.disabled = true;
            status.innerText = "Subiendo recuerdo... 🚀";

            try {
                const formData = new FormData();
                formData.append('file', fileInput.files[0]);
                formData.append('upload_preset', UPLOAD_PRESET);

                const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, { method: 'POST', body: formData });
                const data = await res.json();

                await db.collection("lugares").add({
                    nombre: nombre,
                    fecha: document.getElementById('fechaLugar').value,
                    desc: document.getElementById('descLugar').value,
                    imagen: data.secure_url,
                    creado: firebase.firestore.FieldValue.serverTimestamp()
                });

                status.innerText = "¡Guardado! ❤️";
                document.getElementById('nombreLugar').value = "";
                document.getElementById('descLugar').value = "";
                fileInput.value = "";
            } catch (e) {
                status.innerText = "Error al subir ❌";
            } finally {
                btn.disabled = false;
                setTimeout(() => status.innerText = "", 3000);
            }
        }

        // Función para borrar
        async function borrarLugar(id) {
            if (confirm("¿Seguro que quieres borrar este recuerdo?")) {
                await db.collection("lugares").doc(id).delete();
            }
        }

        db.collection("lugares").orderBy("creado", "desc").onSnapshot((snap) => {
            const grid = document.getElementById('contenedorLugares');
            grid.innerHTML = "";
            snap.forEach((doc) => {
                const lug = doc.data();
                grid.innerHTML += `
                    <div class="card-lugar">
                        <button class="btn-borrar" onclick="borrarLugar('${doc.id}')">🗑️</button>
                        <div class="img-contenedor"><img src="${lug.imagen}"></div>
                        <div class="info-lugar">
                            <span style="color:#d896ff; font-size:0.8em;">📅 ${lug.fecha || ''}</span>
                            <h3>${lug.nombre}</h3>
                            <p>${lug.desc}</p>
                        </div>
                    </div>`;
            });
        });
    </script>
</body>
</html>
