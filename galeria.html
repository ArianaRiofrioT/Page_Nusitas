<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuerdos de Nusitas 📸</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #0d0d0d; color: #ffffff; overflow-x: hidden; }
        
        /* --- CORAZONES GIGANTES FLOTANTES --- */
        #contenedor-corazones { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }
        .corazon-flotante { position: absolute; bottom: -100px; user-select: none; animation: flotar linear infinite; filter: drop-shadow(0 0 15px currentColor); opacity: 0.6; }
        @keyframes flotar {
            0% { transform: translateY(0) rotate(0deg) scale(1); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% { transform: translateY(-120vh) rotate(360deg) scale(1.3); opacity: 0; }
        }

        .btn-volver-flotante { position: fixed; top: 25px; left: 25px; font-size: 3em; color: #333; text-decoration: none; z-index: 1000; transition: 0.3s; }
        .btn-volver-flotante:hover { color: #8a2be2; transform: scale(1.1); }

        .header { text-align: center; padding: 60px 20px; background: linear-gradient(135deg, rgba(138, 43, 226, 0.1), rgba(0, 255, 128, 0.1)); border-bottom: 2px solid #8a2be2; }
        h1 { color: #00ff80; font-size: 3em; text-shadow: 0 0 15px rgba(0, 255, 128, 0.3); }

        /* --- PANEL DE SUBIDA --- */
        .upload-section {
            background: rgba(20, 20, 20, 0.8);
            border: 2px dashed #8a2be2;
            border-radius: 20px;
            padding: 20px;
            max-width: 500px;
            margin: 30px auto;
            text-align: center;
        }
        .upload-section input { width: 90%; margin-top: 10px; padding: 10px; border-radius: 10px; border: 1px solid #333; background: #111; color: white; outline: none; }
        .btn-subir {
            background: #8a2be2; color: white; border: none; padding: 12px 25px; border-radius: 20px;
            cursor: pointer; font-weight: bold; margin-top: 15px; transition: 0.3s;
        }
        .btn-subir:hover:not(:disabled) { background: #00ff80; color: #000; box-shadow: 0 0 15px #00ff80; }

        .content { padding: 40px 20px; max-width: 1200px; margin: 0 auto; }
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; justify-items: center; margin-bottom: 80px; }

        /* --- FLIP CARDS --- */
        .flip-card { background-color: transparent; width: 280px; height: 380px; perspective: 1000px; cursor: pointer; position: relative; }
        .flip-card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.8s; transform-style: preserve-3d; border-radius: 20px; }
        .flip-card.flipped .flip-card-inner { transform: rotateY(180deg); }

        .flip-card-front, .flip-card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 20px; border: 2px solid #8a2be2; overflow: hidden; }
        .flip-card-front img, .flip-card-front video { width: 100%; height: 100%; object-fit: cover; }

        .flip-card-back { background: linear-gradient(135deg, #1a1a1a, #0d0d0d); color: #00ff80; transform: rotateY(180deg); display: flex; align-items: center; justify-content: center; padding: 25px; text-align: center; border-color: #00ff80; }
        .flip-card-back p { font-size: 1.1em; line-height: 1.6; }

        /* Botón borrar (Estilo neón rojo) */
        .btn-borrar {
            position: absolute; top: -10px; right: -10px; background: #ff4d4d; color: white; border: 2px solid white;
            width: 35px; height: 35px; border-radius: 50%; cursor: pointer; z-index: 10; font-weight: bold;
            box-shadow: 0 0 10px rgba(255, 77, 77, 0.5);
        }

        /* --- SECCIÓN QR (TU DISEÑO ORIGINAL) --- */
        .qr-section { 
            background: #151515; border: 2px solid #00ff80; border-radius: 25px; padding: 40px; 
            text-align: center; max-width: 500px; margin: 50px auto 100px auto; 
            box-shadow: 0 0 20px rgba(0, 255, 128, 0.1);
        }
        .qr-frame { background-color: white; padding: 15px; border-radius: 15px; display: inline-block; margin-bottom: 20px; }
        .qr-frame img { width: 220px; height: 220px; display: block; }
        .btn-dots { 
            display: inline-block; padding: 12px 25px; color: #00ff80; border: 2px solid #00ff80; 
            border-radius: 30px; text-decoration: none; font-weight: bold; transition: 0.3s; 
        }
        .btn-dots:hover { background: #00ff80; color: #000; }
    </style>
</head>
<body>

    <div id="contenedor-corazones"></div>
    <a href="index.html" class="btn-volver-flotante">⬅</a>

    <div class="header">
        <h1>Los recuerdos de Nusitas 📸</h1>
    </div>

    <div class="upload-section">
        <h3 style="color:#00ff80; margin-bottom:10px;">Añadir nuevo recuerdo ✨</h3>
        <p style="font-size: 0.8em; color: #ccc;">Selecciona foto o video:</p>
        <input type="file" id="inputFoto" accept="image/*,video/*">
        <input type="text" id="textoFoto" placeholder="Mensaje para el reverso de la carta...">
        <button class="btn-subir" id="btnGuardar" onclick="subirFoto()">Guardar en la Nube ❤️</button>
        <p id="status" style="font-size:0.8em; margin-top:10px; color:#8a2be2; font-weight: bold;"></p>
    </div>

    <div class="content">
        <h2 style="text-align:center; color:#8a2be2; margin-bottom:40px;">Nuestra Historia en Fotos y Videos ❤️</h2>
        
        <div class="gallery-grid" id="gridGaleria"></div>

        <div class="qr-section">
            <h3>✨ Nuestro Álbum Completo ✨</h3>
            <p style="color: #888; margin-bottom: 15px; font-size: 0.9em;">Escanea para ver más momentos</p>
            <div class="qr-frame">
                <img src="qr-dots.png" alt="QR Dots">
            </div>
            <br>
            <a href="https://web.dotstheapp.com/a?group=1687473&dlBy=arianariofrio908&code=kDuXw1wHjjJl&utm_source=guest&utm_medium=share&utm_campaign=guest_memory_album&force_app=1" target="_blank" class="btn-dots">Abrir Álbum en Dots</a>
        </div>
    </div>

    <script>
        // --- CONFIGURACIÓN FIREBASE ---
        const firebaseConfig = {
            apiKey: "AIzaSyDccmduaptWiK-3VKRWeU2PR4PBscr-Tmg",
            authDomain: "webnusitas.firebaseapp.com",
            projectId: "webnusitas",
            storageBucket: "webnusitas.firebasestorage.app",
            messagingSenderId: "509688237934",
            appId: "1:509688237934:web:2a7af79ebb0a9128b77b7f"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // --- CONFIGURACIÓN CLOUDINARY ---
        const CLOUD_NAME = "dzmkvt63j"; 
        const UPLOAD_PRESET = "web_fotos"; 

        async function subirFoto() {
            const file = document.getElementById('inputFoto').files[0];
            const texto = document.getElementById('textoFoto').value;
            const status = document.getElementById('status');
            const btn = document.getElementById('btnGuardar');

            if(!file) return alert("Por favor, elige una foto o video");
            
            btn.disabled = true;
            status.innerText = "Subiendo recuerdo a la nube... 🚀";

            try {
                const formData = new FormData();
                formData.append('file', file);
                formData.append('upload_preset', UPLOAD_PRESET);

                const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/upload`, {
                    method: 'POST', body: formData
                });
                const data = await res.json();

                await db.collection("galeria").add({
                    url: data.secure_url,
                    tipo: file.type.includes('video') ? 'video' : 'foto',
                    mensaje: texto || "Un momento especial ❤️",
                    creado: firebase.firestore.FieldValue.serverTimestamp()
                });

                status.innerText = "¡Recuerdo guardado con éxito! ✨";
                document.getElementById('inputFoto').value = "";
                document.getElementById('textoFoto').value = "";
            } catch (e) {
                console.error(e);
                status.innerText = "Error al subir ❌";
            } finally {
                btn.disabled = false;
                setTimeout(() => status.innerText = "", 3000);
            }
        }

        async function borrarFoto(id) {
            if(confirm("¿Estás seguro de que quieres eliminar este recuerdo de la galería?")) {
                await db.collection("galeria").doc(id).delete();
            }
        }

        // Leer fotos en tiempo real y generar las Flip Cards
        db.collection("galeria").orderBy("creado", "desc").onSnapshot((snap) => {
            const grid = document.getElementById('gridGaleria');
            grid.innerHTML = "";
            snap.forEach(doc => {
                const data = doc.data();
                const mediaHTML = data.tipo === 'video' 
                    ? `<video autoplay loop muted playsinline><source src="${data.url}" type="video/mp4"></video>`
                    : `<img src="${data.url}">`;

                grid.innerHTML += `
                    <div class="flip-card" onclick="this.classList.toggle('flipped')">
                        <button class="btn-borrar" onclick="event.stopPropagation(); borrarFoto('${doc.id}')">✕</button>
                        <div class="flip-card-inner">
                            <div class="flip-card-front">${mediaHTML}</div>
                            <div class="flip-card-back"><p>${data.mensaje}</p></div>
                        </div>
                    </div>`;
            });
        });

        // --- CORAZONES FLOTANTES ---
        function crearCorazon() {
            const contenedor = document.getElementById('contenedor-corazones');
            const corazon = document.createElement('div');
            const colores = ['#8a2be2', '#00ff80']; 
            const colorRandom = colores[Math.floor(Math.random() * colores.length)];
            const size = Math.random() * (90 - 50) + 50 + 'px'; 
            const left = Math.floor(Math.random() * 100) + 'vw';
            const duracion = Math.random() * (12 - 7) + 7 + 's';
            corazon.classList.add('corazon-flotante');
            corazon.innerHTML = '❤️'; 
            corazon.style.left = left;
            corazon.style.color = colorRandom;
            corazon.style.fontSize = size;
            corazon.style.animationDuration = duracion;
            contenedor.appendChild(corazon);
            setTimeout(() => { corazon.remove(); }, 12000);
        }
        setInterval(crearCorazon, 500);
    </script>
</body>
</html>
